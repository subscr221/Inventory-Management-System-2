services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: inventory_events
      DB_USER: app_user
      DB_PASSWORD: ${DB_PASSWORD:-app_password}
      DB_SSL: "false"
      # Auth + SCIM are validated at startup (src/config/index.ts). Under NODE_ENV=production the
      # app requires OIDC config and a SCIM bearer token; ${VAR:?...} makes `docker compose up`
      # fail with a clear message when one is missing instead of the container crash-looping.
      AUTH_MODE: oidc
      AUTH_JWKS_URI: ${AUTH_JWKS_URI:?set AUTH_JWKS_URI to the IdP JWKS endpoint}
      AUTH_ISSUER: ${AUTH_ISSUER:?set AUTH_ISSUER to the IdP issuer}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:?set AUTH_AUDIENCE to this API's audience}
      SCIM_BEARER_TOKEN: ${SCIM_BEARER_TOKEN:?set SCIM_BEARER_TOKEN to a long random secret}
    ports:
      - "3000:3000"
    networks:
      - backend

  postgres:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_events
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-admin_password}
    volumes:
      # postgres:18+ images store data in a major-version-specific subdirectory under a
      # single /var/lib/postgresql mount (not /var/lib/postgresql/data directly) - see
      # https://github.com/docker-library/postgres/pull/1259
      - pg_data:/var/lib/postgresql
      - ./init-wal-archive.sh:/docker-entrypoint-initdb.d/00-init-wal-archive.sh
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=cp %p /var/lib/postgresql/wal_archive/%f"
      - "-c"
      - "archive_timeout=300"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
      # Attribute server-log lines to a session user and database: the server error log is the
      # designated durable record of direct-DB tamper attempts (see init-db.sql), and the default
      # prefix ('%m [%p] ') logs neither. log_connections gives PID-to-user correlation as backup.
      - "-c"
      - "log_line_prefix=%m [%p] user=%u db=%d "
      - "-c"
      - "log_connections=on"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d inventory_events"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  postgres-standby:
    image: postgres:18.4
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: replication_user
    volumes:
      - pg_standby_data:/var/lib/postgresql/data
    entrypoint: |
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        echo 'Initializing standby from primary...'
        pg_basebackup -h postgres -U replication_user -D /var/lib/postgresql/data -Fp -Xs -P -R
      fi
      exec docker-entrypoint.sh postgres -c 'hot_standby=on'
      "
    ports:
      - "5433:5432"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend

volumes:
  pg_data:
  pg_standby_data:

networks:
  backend:
    driver: bridge
