<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Background tablet screen (dimmed behind modal) -->
  <rect x="0" y="0" width="1024" height="768" fill="#f8f9fa"/>
  <rect x="0" y="0" width="1024" height="64" fill="#1f2937"/>
  <text x="24" y="38" font-size="18" font-weight="700" fill="#ffffff">Putaway Task</text>
  <rect x="720" y="16" width="180" height="32" rx="16" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="738" cy="32" r="5" fill="#f59e0b"/>
  <text x="752" y="37" font-size="12" font-weight="600" fill="#f59e0b">Captured, pending sync</text>
  <circle cx="960" cy="32" r="20" fill="#8a95a1"/>
  <text x="960" y="37" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">WA</text>

  <!-- Dimmed content behind modal -->
  <rect x="0" y="64" width="1024" height="704" fill="#1f2937" fill-opacity="0.45"/>
  <text x="48" y="120" font-size="16" fill="#ffffff" fill-opacity="0.7">Putaway Task: Lot QZ-4421 (Motor 5kW), Qty 20 units</text>

  <!-- Modal container (radius 12px per spec) -->
  <rect x="212" y="96" width="600" height="576" rx="12" fill="#ffffff" stroke="#d0d5db" stroke-width="1.5"/>

  <!-- Modal header -->
  <text x="244" y="140" font-size="20" font-weight="700" fill="#1f2937">Putaway Confirmation</text>
  <text x="244" y="164" font-size="13" fill="#54636e">Lot QZ-4421 · Motor 5kW · Qty 20 units</text>
  <rect x="212" y="184" width="600" height="1" fill="#e4e8eb"/>

  <!-- Expected vs actual location comparison -->
  <text x="244" y="212" font-size="12" font-weight="600" letter-spacing="0.02em" fill="#6b7683">EXPECTED LOCATION</text>
  <rect x="244" y="220" width="240" height="44" rx="4" fill="#f0f2f5" stroke="#d0d5db" stroke-width="1"/>
  <text x="264" y="248" font-size="16" font-weight="700" fill="#1f2937">BIN-A47</text>

  <text x="524" y="212" font-size="12" font-weight="600" letter-spacing="0.02em" fill="#6b7683">SCANNED LOCATION</text>
  <rect x="524" y="220" width="240" height="44" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="544" y="248" font-size="16" font-weight="700" fill="#ef4444">BIN-A43</text>

  <!-- Warning icon and mismatch message -->
  <rect x="244" y="280" width="520" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="256" y="306" font-size="16" fill="#f59e0b">!</text>
  <text x="278" y="305" font-size="13" font-weight="600" fill="#92400e">Location Mismatch Detected - why did you put it here?</text>

  <!-- Reason code radio buttons -->
  <text x="244" y="346" font-size="12" font-weight="600" letter-spacing="0.02em" fill="#6b7683">REASON CODE</text>

  <circle cx="256" cy="368" r="8" fill="#ffffff" stroke="#1f47d9" stroke-width="2"/>
  <circle cx="256" cy="368" r="4" fill="#1f47d9"/>
  <text x="272" y="373" font-size="14" fill="#1f2937">Accessibility - space constraint or stacking issue</text>

  <circle cx="256" cy="396" r="8" fill="#ffffff" stroke="#8a95a1" stroke-width="2"/>
  <text x="272" y="401" font-size="14" fill="#3d4651">Wrong Pick - picked wrong bin</text>

  <circle cx="524" cy="368" r="8" fill="#ffffff" stroke="#8a95a1" stroke-width="2"/>
  <text x="540" y="373" font-size="14" fill="#3d4651">Better Access - this bin is more efficient</text>

  <circle cx="524" cy="396" r="8" fill="#ffffff" stroke="#8a95a1" stroke-width="2"/>
  <text x="540" y="401" font-size="14" fill="#3d4651">Inventory Error - expected plan was wrong</text>

  <!-- Confidence selector -->
  <text x="244" y="440" font-size="12" font-weight="600" letter-spacing="0.02em" fill="#6b7683">CONFIDENCE</text>
  <rect x="244" y="452" width="120" height="36" rx="18" fill="#1f47d9"/>
  <text x="304" y="475" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Certain</text>
  <rect x="372" y="452" width="130" height="36" rx="18" fill="#ffffff" stroke="#d0d5db" stroke-width="1.5"/>
  <text x="437" y="475" font-size="13" fill="#3d4651" text-anchor="middle">Uncertain</text>

  <rect x="212" y="508" width="600" height="1" fill="#e4e8eb"/>

  <!-- Action buttons -->
  <rect x="244" y="528" width="220" height="44" rx="4" fill="#1f47d9"/>
  <text x="354" y="555" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Confirm Override</text>

  <rect x="480" y="528" width="150" height="44" rx="4" fill="#f0f2f5" stroke="#d0d5db" stroke-width="1.5"/>
  <text x="555" y="555" font-size="14" font-weight="600" fill="#1f2937" text-anchor="middle">Rescan</text>

  <text x="244" y="608" font-size="12" fill="#8a95a1">Override is logged with actor, reason, and confidence for ABC slotting re-training. Nothing is deleted.</text>
</svg>
