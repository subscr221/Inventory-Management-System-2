name: CI

# Story 1.10: every branch push and every pull request runs the full required-check set.
# Required check names below (backend-quality, backend-tests, spine-acceptance-contract,
# edge-quality, edge-accessibility) are load-bearing - deploy/pipeline/branch-protection.json
# references these exact names. Do not rename them and do not introduce a build matrix, which
# would append a runtime suffix to each name and break branch protection.

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
      - run: git diff --check

  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: admin_user
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: inventory_events
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin_user -d inventory_events"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Load test environment
        run: grep -vE '^[[:space:]]*(#|$)' .env.test >> "$GITHUB_ENV"
      - run: npm ci
      - name: Provision CI database roles
        run: PGPASSWORD="$DB_ADMIN_PASSWORD" psql -h localhost -U "$DB_ADMIN_USER" -d "$DB_NAME" -v ON_ERROR_STOP=1 -f deploy/pipeline/ci/db-roles.sql
      - run: npm run db:migrate
      - run: npm test

  spine-acceptance-contract:
    # Required check name is fixed by Story 1.9 and must not be renamed, duplicated, or
    # reimplemented. This job only invokes the existing script; it does not reproduce its logic.
    name: spine-acceptance-contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: admin_user
          POSTGRES_PASSWORD: admin_password
          POSTGRES_DB: inventory_events
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin_user -d inventory_events"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Load test environment
        run: grep -vE '^[[:space:]]*(#|$)' .env.test >> "$GITHUB_ENV"
      - run: npm ci
      - name: Provision CI database roles
        run: PGPASSWORD="$DB_ADMIN_PASSWORD" psql -h localhost -U "$DB_ADMIN_USER" -d "$DB_NAME" -v ON_ERROR_STOP=1 -f deploy/pipeline/ci/db-roles.sql
      - run: npm run db:migrate
      - run: npm run spine-acceptance-contract
      - name: Upload spine-acceptance-contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spine-acceptance-contract-results
          path: spine-acceptance-contract-results.xml
          if-no-files-found: warn
          retention-days: 30

  edge-quality:
    name: edge-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run edge:typecheck
      - run: npm run edge:lint
      - run: npm run edge:build
      - run: npm run edge:test

  edge-accessibility:
    name: edge-accessibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        working-directory: edge
        run: npx playwright install --with-deps chromium
      - run: npm run edge:accessibility
      - run: npm run edge:test:e2e
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edge-accessibility-report
          path: edge/playwright-report/
          if-no-files-found: ignore
          retention-days: 30
